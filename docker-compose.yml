services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kitchens_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - kitchens
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: kitchens_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - kitchens
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: kitchens_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kitchens
      POSTGRES_USER: kitchens
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - kitchens

  redis:
    image: redis:7-alpine
    container_name: kitchens_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - kitchens

  frontend:
    image: node:20-alpine
    container_name: kitchens_frontend
    working_dir: /app
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - kitchens

networks:
  kitchens:
    driver: bridge

volumes:
  dbdata:
